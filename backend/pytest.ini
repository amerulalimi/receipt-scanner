[pytest]
testpaths = tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
markers =
    unit: Unit tests (no external services)
    integration: Integration tests (ASGI app, CORS, etc.)
addopts =
    --strict-markers
    -ra

[coverage:run]
source = app
branch = True

[coverage:report]
show_missing = True
skip_empty = True
