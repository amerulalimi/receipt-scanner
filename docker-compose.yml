services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-resitmy}
      POSTGRES_USER: ${POSTGRES_USER:-resit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-resit_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-resit} -d ${POSTGRES_DB:-resitmy}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-resit}:${POSTGRES_PASSWORD:-resit_dev}@postgres:5432/${POSTGRES_DB:-resitmy}
      REDIS_URL: redis://redis:6379/0
      RUN_IN_PROCESS_WORKER: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/storage:/app/storage

  worker:
    build: ./backend
    command: python -m app.worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-resit}:${POSTGRES_PASSWORD:-resit_dev}@postgres:5432/${POSTGRES_DB:-resitmy}
      REDIS_URL: redis://redis:6379/0
      RUN_IN_PROCESS_WORKER: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/storage:/app/storage

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      FASTAPI_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_APP_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      - backend

volumes:
  postgres_data:
