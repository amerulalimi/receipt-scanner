services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: resit
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d resit"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/resit
      REDIS_URL: redis://redis:6379/0
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000
      RUN_IN_PROCESS_WORKER: "false"
      ENVIRONMENT: development
      DEBUG: "true"
      SESSION_SECRET: changeme-min-32-chars-for-dev-only!!
      SESSION_COOKIE_NAME: resit_sess
      SESSION_TTL_SECONDS: "28800"
      ADMIN_SESSION_COOKIE_NAME: admin_resit_sess
      ADMIN_SESSION_TTL_SECONDS: "28800"
      STORAGE_BACKEND: local
      LOCAL_STORAGE_PATH: ./storage/receipts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/storage:/app/storage
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build: ./backend
    command: python -m app.worker
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/resit
      REDIS_URL: redis://redis:6379/0
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000
      RUN_IN_PROCESS_WORKER: "false"
      ENVIRONMENT: development
      DEBUG: "true"
      SESSION_SECRET: changeme-min-32-chars-for-dev-only!!
      SESSION_COOKIE_NAME: resit_sess
      SESSION_TTL_SECONDS: "28800"
      ADMIN_SESSION_COOKIE_NAME: admin_resit_sess
      ADMIN_SESSION_TTL_SECONDS: "28800"
      STORAGE_BACKEND: local
      LOCAL_STORAGE_PATH: ./storage/receipts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/storage:/app/storage

  frontend:
    build:
      context: ./frontend
      args:
        FASTAPI_URL: http://backend:8000
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_APP_URL: http://localhost:3000
        SESSION_COOKIE_NAME: resit_sess
        SESSION_TTL_SECONDS: "28800"
        ADMIN_SESSION_COOKIE_NAME: admin_resit_sess
        ADMIN_SESSION_TTL_SECONDS: "28800"
    ports:
      - "3000:3000"
    environment:
      FASTAPI_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      SESSION_COOKIE_NAME: resit_sess
      SESSION_TTL_SECONDS: "28800"
      ADMIN_SESSION_COOKIE_NAME: admin_resit_sess
      ADMIN_SESSION_TTL_SECONDS: "28800"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
